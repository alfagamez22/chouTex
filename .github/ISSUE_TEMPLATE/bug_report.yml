name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I have read and agree to the [Code of Conduct](https://github.com/TeXlyre/texlyre/blob/main/CODE_OF_CONDUCT.md)
          required: true
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Brief description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
